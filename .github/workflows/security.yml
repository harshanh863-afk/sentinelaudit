name: SentinelAudit CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt 2>/dev/null || pip install -r requirements.txt
          pip install ruff pytest

      - name: Lint with Ruff
        run: ruff check app/ tests/ --ignore=E501

      - name: Run backend tests
        run: python -m pytest tests/ -v --tb=short
        env:
          PYTHONPATH: app

  test-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx eslint src/ --ext .ts,.tsx 2>/dev/null || echo "ESLint not configured, skipping"

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Run frontend tests
        run: npm test

      - name: Build frontend
        run: npm run build

  security-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: npm audit
        working-directory: frontend
        run: npm audit --audit-level=high || echo "npm audit found issues (non-blocking)"

      - name: pip-audit
        working-directory: backend
        run: |
          pip install pip-audit
          pip-audit || echo "pip-audit found issues (non-blocking)"
