services:
  - type: web
    name: sentinelaudit-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port 8000
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: FRONTEND_URL
        value: https://sentinelaudit.vercel.app
      - key: DEBUG
        value: "false"

  - type: worker
    name: sentinelaudit-worker
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    startCommand: celery -A app.workers.celery_app worker --loglevel=info --concurrency=2
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: FRONTEND_URL
        value: https://sentinelaudit.vercel.app
      - key: DEBUG
        value: "false"
