rules:
  - id: "TLS-004"
    name: "Weak TLS Cipher Suite"
    category: "tls_analysis"
    severity: "high"
    cvss_score: 7.4
    description: >
      The server accepts connections using weak cipher suites such as
      RC4, 3DES, or export-grade ciphers. These ciphers are deprecated
      and vulnerable to attacks including RC4 biases and Sweet32.
    impact: >
      An attacker with network access can decrypt TLS-protected traffic,
      recover session keys, or downgrade the cryptographic strength of
      the connection.
    evidence_description: >
      The server offered weak cipher suites during the TLS handshake.
    remediation: >
      Disable all weak cipher suites on the server. Configure the server
      to use only ciphers that provide authenticated encryption and
      forward secrecy, such as TLS_AES_256_GCM_SHA384 (TLS 1.3) or
      ECDHE-RSA-AES256-GCM-SHA384 (TLS 1.2).
    references:
      - "https://owasp.org/www-project-transport-layer-protection/"
      - "https://nvlpubs.nist.gov/nistpubs/SpecialPublications/NIST.SP.800-52r2.pdf"
      - "https://cheatsheetseries.owasp.org/cheatsheets/Transport_Layer_Protection_Cheat_Sheet.html"
    compliance:
      - framework: "owasp"
        control_id: "A02"
        control_name: "Cryptographic Failures"
      - framework: "owasp_asvs"
        control_id: "V9"
        control_name: "Communications Verification"
      - framework: "nist"
        control_id: "PR.DS"
        control_name: "Data Security"
      - framework: "nist_80053"
        control_id: "SC-13"
        control_name: "Cryptographic Protection"
      - framework: "cis"
        control_id: "4"
        control_name: "Secure Configuration of Enterprise Assets"
      - framework: "iso_27001"
        control_id: "A.8.24"
        control_name: "Use of Cryptography"
      - framework: "pci_dss"
        control_id: "4.1"
        control_name: "Strong Cryptography"
      - framework: "gdpr"
        control_id: "Art.32"
        control_name: "Security of Processing"
      - framework: "tls_sec"
        control_id: "TLS-6"
        control_name: "Weak Cipher Detection"
      - framework: "tls_sec"
        control_id: "TLS-7"
        control_name: "Secure Cipher Suites"
    cwe:
      - cwe_id: "CWE-327"
        name: "Use of a Broken or Risky Cryptographic Algorithm"
      - cwe_id: "CWE-326"
        name: "Inadequate Encryption Strength"
    capec:
      - capec_id: "CAPEC-94"
        name: "Man in the Middle Attack"
      - capec_id: "CAPEC-74"
        name: "Man-in-the-Middle TLS Attack"
