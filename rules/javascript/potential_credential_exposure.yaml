rules:
  - id: "JS-002"
    name: "Potential Credential Exposure in JavaScript"
    category: "javascript"
    severity: "high"
    cvss_score: 7.8
    description: >
      Potential secrets or credentials were detected in JavaScript files
      served to the client. This includes API keys, tokens, passwords,
      or other sensitive strings that should never be exposed client-side.
    impact: >
      Exposed credentials can be extracted by anyone viewing the page
      source or using browser developer tools. This may lead to
      unauthorized access to third-party services, data breaches,
      or account compromise.
    evidence_description: >
      Potential credential patterns were found in JavaScript responses.
    remediation: >
      Remove all secrets and credentials from client-side code. Use
      server-side APIs to proxy authenticated requests. Never embed
      API keys, tokens, or passwords in JavaScript bundles or HTML.
    references:
      - "https://owasp.org/www-project-top-ten/"
      - "https://cheatsheetseries.owasp.org/cheatsheets/Secrets_Management_Cheat_Sheet.html"
    compliance:
      - framework: "owasp"
        control_id: "A02"
        control_name: "Cryptographic Failures"
      - framework: "owasp_asvs"
        control_id: "V6"
        control_name: "Stored Cryptography Verification"
      - framework: "nist"
        control_id: "PR.AA"
        control_name: "Identity Management and Access Control"
      - framework: "nist_80053"
        control_id: "IA-5"
        control_name: "Authenticator Management"
      - framework: "cis"
        control_id: "5"
        control_name: "Account Management"
      - framework: "iso_27001"
        control_id: "A.8.24"
        control_name: "Use of Cryptography"
      - framework: "pci_dss"
        control_id: "8.1"
        control_name: "Authentication"
      - framework: "gdpr"
        control_id: "Art.32"
        control_name: "Security of Processing"
      - framework: "hipaa"
        control_id: "164.312(d)"
        control_name: "Person or Entity Authentication"
    cwe:
      - cwe_id: "CWE-798"
        name: "Hardcoded Credentials"
      - cwe_id: "CWE-522"
        name: "Insufficiently Protected Credentials"
      - cwe_id: "CWE-200"
        name: "Information Exposure"
    capec:
      - capec_id: "CAPEC-161"
        name: "Infrastructure Manipulation"
      - capec_id: "CAPEC-459"
        name: "Malicious Code Injection in Software"
